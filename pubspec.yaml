name: helixtrace
description: "HelixTrace - Network mapping and tracing application."
publish_to: 'none'

version: 0.0.2-alpha+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  dio: ^5.8.0+1
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  flutter_dotenv: ^6.0.1
  flutter_map: ^8.3.0
  geolocator: ^14.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
